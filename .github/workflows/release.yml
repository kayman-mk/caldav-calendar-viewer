name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        run: |
          mkdir -p build/ical-calendar-view
          cp -r ical-calendar-view.php includes/ assets/ README.md readme.txt build/ical-calendar-view/
          cd build
          zip -r ../ical-calendar-view-${{ steps.version.outputs.version }}.zip ical-calendar-view/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ical-calendar-view-${{ steps.version.outputs.version }}.zip


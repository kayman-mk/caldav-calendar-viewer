name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        run: |
          mkdir -p build/caldav-calendar-viewer
          cp -r caldav-calendar-viewer.php includes/ assets/ README.md readme.txt build/caldav-calendar-viewer/
          cd build
          zip -r ../caldav-calendar-viewer-${{ steps.version.outputs.version }}.zip caldav-calendar-viewer/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: caldav-calendar-viewer-${{ steps.version.outputs.version }}.zip


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2271b1"/>
      <stop offset="100%" stop-color="#135e96"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d63638"/>
      <stop offset="100%" stop-color="#b32d2e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="256" height="256" rx="32" ry="32" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="32" y="56" width="192" height="172" rx="12" ry="12" fill="#ffffff"/>

  <!-- Calendar header bar (red) -->
  <rect x="32" y="56" width="192" height="44" rx="12" ry="12" fill="url(#header)"/>
  <rect x="32" y="80" width="192" height="20" fill="url(#header)"/>

  <!-- Calendar binding rings -->
  <rect x="72" y="42" width="12" height="28" rx="4" ry="4" fill="#ffffff"/>
  <rect x="172" y="42" width="12" height="28" rx="4" ry="4" fill="#ffffff"/>

  <!-- Month dots in header -->
  <circle cx="94" cy="78" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="110" cy="78" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="126" cy="78" r="4" fill="#ffffff"/>
  <circle cx="142" cy="78" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="158" cy="78" r="4" fill="rgba(255,255,255,0.7)"/>

  <!-- Grid lines -->
  <line x1="32" y1="136" x2="224" y2="136" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="32" y1="172" x2="224" y2="172" stroke="#e0e0e0" stroke-width="1"/>

  <line x1="80" y1="100" x2="80" y2="228" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="128" y1="100" x2="128" y2="228" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="176" y1="100" x2="176" y2="228" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Day numbers -->
  <text x="56" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">1</text>
  <text x="104" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">2</text>
  <text x="152" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">3</text>
  <text x="200" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">4</text>

  <text x="56" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">5</text>
  <text x="104" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">6</text>
  <text x="152" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">7</text>
  <text x="200" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">8</text>

  <text x="56" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">9</text>
  <text x="104" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#50575e">10</text>

  <!-- Highlighted "today" cell -->
  <rect x="129" y="137" width="46" height="34" rx="4" ry="4" fill="#e7f5fe"/>
  <text x="152" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2271b1">7</text>

  <!-- Event bars -->
  <rect x="42" y="127" width="28" height="6" rx="3" ry="3" fill="#2271b1"/>
  <rect x="138" y="163" width="28" height="6" rx="3" ry="3" fill="#d63638"/>
  <rect x="90" y="163" width="28" height="6" rx="3" ry="3" fill="#2271b1"/>
  <rect x="186" y="127" width="28" height="6" rx="3" ry="3" fill="#dba617"/>

  <!-- Sync/refresh icon (bottom right) representing iCal fetch -->
  <g transform="translate(196, 200)">
    <path d="M8,0 A16,16 0 1,1 -8,16" fill="none" stroke="#2271b1" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="-12,12 -8,20 -2,14" fill="#2271b1"/>
    <path d="M-8,32 A16,16 0 1,1 8,16" fill="none" stroke="#2271b1" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="12,20 8,12 2,18" fill="#2271b1"/>
  </g>
</svg>


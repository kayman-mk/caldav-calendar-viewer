name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit --testdox

  release:
    name: Build and publish release
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        run: |
          mkdir -p build/wordpress-ical-calendar
          cp -r wordpress-ical-calendar.php includes/ assets/ README.md build/wordpress-ical-calendar/
          cd build
          zip -r ../wordpress-ical-calendar-${{ steps.version.outputs.version }}.zip wordpress-ical-calendar/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: wordpress-ical-calendar-${{ steps.version.outputs.version }}.zip


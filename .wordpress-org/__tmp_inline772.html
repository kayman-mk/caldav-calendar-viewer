<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:772px;height:250px;overflow:hidden;background:#135e96;}
</style>
</head><body><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="50%" stop-color="#2271b1"/>
      <stop offset="100%" stop-color="#135e96"/>
    </linearGradient>
    <linearGradient id="calHeader" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d63638"/>
      <stop offset="100%" stop-color="#b32d2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="772" height="250" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="772" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="772" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="772" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="772" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="250" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Calendar illustration (left side) -->
  <g transform="translate(80, 35)">
    <!-- Calendar body -->
    <rect x="0" y="20" width="160" height="160" rx="10" ry="10" fill="#ffffff" opacity="0.95"/>
    <!-- Calendar header -->
    <rect x="0" y="20" width="160" height="36" rx="10" ry="10" fill="url(#calHeader)"/>
    <rect x="0" y="40" width="160" height="16" fill="url(#calHeader)"/>
    <!-- Binding rings -->
    <rect x="34" y="10" width="10" height="22" rx="3" ry="3" fill="#ffffff"/>
    <rect x="116" y="10" width="10" height="22" rx="3" ry="3" fill="#ffffff"/>
    <!-- Weekday dots -->
    <circle cx="50" cy="38" r="2.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="65" cy="38" r="2.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="80" cy="38" r="2.5" fill="#ffffff"/>
    <circle cx="95" cy="38" r="2.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="110" cy="38" r="2.5" fill="rgba(255,255,255,0.6)"/>
    <!-- Grid lines -->
    <line x1="0" y1="92" x2="160" y2="92" stroke="#e8e8e8" stroke-width="0.75"/>
    <line x1="0" y1="128" x2="160" y2="128" stroke="#e8e8e8" stroke-width="0.75"/>
    <line x1="40" y1="56" x2="40" y2="180" stroke="#e8e8e8" stroke-width="0.75"/>
    <line x1="80" y1="56" x2="80" y2="180" stroke="#e8e8e8" stroke-width="0.75"/>
    <line x1="120" y1="56" x2="120" y2="180" stroke="#e8e8e8" stroke-width="0.75"/>
    <!-- Day numbers -->
    <text x="20" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">1</text>
    <text x="60" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">2</text>
    <text x="100" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">3</text>
    <text x="140" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">4</text>
    <text x="20" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">5</text>
    <text x="60" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">6</text>
    <text x="140" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">8</text>
    <text x="20" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">9</text>
    <text x="60" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">10</text>
    <text x="100" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">11</text>
    <text x="140" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#50575e">12</text>
    <!-- Today highlight -->
    <rect x="81" y="93" width="38" height="34" rx="4" ry="4" fill="#e7f5fe"/>
    <text x="100" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2271b1">7</text>
    <!-- Event bars -->
    <rect x="6" y="82" width="28" height="5" rx="2.5" ry="2.5" fill="#2271b1"/>
    <rect x="86" y="118" width="28" height="5" rx="2.5" ry="2.5" fill="#d63638"/>
    <rect x="46" y="118" width="28" height="5" rx="2.5" ry="2.5" fill="#dba617"/>
    <rect x="126" y="82" width="28" height="5" rx="2.5" ry="2.5" fill="#2271b1" opacity="0.6"/>
    <rect x="6" y="154" width="28" height="5" rx="2.5" ry="2.5" fill="#dba617"/>
    <rect x="86" y="154" width="28" height="5" rx="2.5" ry="2.5" fill="#2271b1" opacity="0.6"/>
    <!-- Sync icon -->
    <g transform="translate(140, 158) scale(0.7)">
      <path d="M6,0 A12,12 0 1,1 -6,12" fill="none" stroke="#2271b1" stroke-width="3" stroke-linecap="round"/>
      <polygon points="-9,9 -6,16 -1,11" fill="#2271b1"/>
      <path d="M-6,24 A12,12 0 1,1 6,12" fill="none" stroke="#2271b1" stroke-width="3" stroke-linecap="round"/>
      <polygon points="9,15 6,8 1,13" fill="#2271b1"/>
    </g>
  </g>
  <!-- Plugin title text -->
  <text x="310" y="95" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="#ffffff" letter-spacing="0.5">CalDav Calendar Viewer</text>
  <!-- Subtitle -->
  <text x="310" y="128" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">for WordPress</text>
  <!-- Feature pills -->
  <g transform="translate(310, 150)">
    <rect x="0" y="0" width="98" height="26" rx="13" ry="13" fill="rgba(255,255,255,0.15)"/>
    <text x="49" y="17" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Multi-Feed</text>
    <rect x="108" y="0" width="98" height="26" rx="13" ry="13" fill="rgba(255,255,255,0.15)"/>
    <text x="157" y="17" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Basic Auth</text>
    <rect x="216" y="0" width="98" height="26" rx="13" ry="13" fill="rgba(255,255,255,0.15)"/>
    <text x="265" y="17" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Encrypted</text>
    <rect x="0" y="34" width="98" height="26" rx="13" ry="13" fill="rgba(255,255,255,0.15)"/>
    <text x="49" y="51" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Shortcode</text>
    <rect x="108" y="34" width="98" height="26" rx="13" ry="13" fill="rgba(255,255,255,0.15)"/>
    <text x="157" y="51" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Responsive</text>
    <rect x="216" y="34" width="98" height="26" rx="13" ry="13" fill="rgba(255,255,255,0.15)"/>
    <text x="265" y="51" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Cached</text>
  </g>
</svg>
</body></html>
